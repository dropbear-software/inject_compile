targets:
  $default:
    builders:
      inject_compile_generator|summary_builder:
        enabled: true
      inject_compile_generator|inject_builder:
        enabled: true

builders:
  summary_builder:
    import: "package:inject_compile_generator/inject_compile_generator.dart"
    builder_factories: ["summaryBuilder"]
    build_extensions: {".dart": [".inject.summary"]}
    auto_apply: dependents
    build_to: cache

  inject_builder:
    import: "package:inject_compile_generator/inject_compile_generator.dart"
    builder_factories: ["injectBuilder"]
    build_extensions: {".inject.summary": [".inject.dart"]}
    auto_apply: dependents
    build_to: source
    required_inputs: [".inject.summary"]
